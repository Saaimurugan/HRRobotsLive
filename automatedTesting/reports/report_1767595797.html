
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Robots - Test Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .report-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; }
        .stat-card { border-radius: 10px; padding: 1.5rem; text-align: center; }
        .stat-card.passed { background: #d4edda; color: #155724; }
        .stat-card.failed { background: #f8d7da; color: #721c24; }
        .stat-card.skipped { background: #fff3cd; color: #856404; }
        .stat-number { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="report-header">
        <div class="container">
            <h1>🤖 HR Robots - Selenium Test Report</h1>
            <p class="mb-0">Generated: 2026-01-05 12:19:57</p>
        </div>
    </div>
    
    <div class="container my-4">
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card passed">
                    <div class="stat-number">0</div>
                    <div>Passed</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card failed">
                    <div class="stat-number">0</div>
                    <div>Failed</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card skipped">
                    <div class="stat-number">0</div>
                    <div>Skipped</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="background: #e2e3e5;">
                    <div class="stat-number">0.0%</div>
                    <div>Pass Rate</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Test Results</h5>
            </div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Test Name</th>
                            <th>Status</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody>
                        
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="card mt-4">
            <div class="card-header">
                <h5 class="mb-0">Console Output</h5>
            </div>
            <div class="card-body">
                <pre style="background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 5px; max-height: 400px; overflow: auto;"></pre>
            </div>
        </div>
    </div>
</body>
</html>

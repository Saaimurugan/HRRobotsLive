<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Robots - Test Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        * { font-size: 12px; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .dashboard-header { background: var(--primary-gradient); color: white; padding: 0.5rem 0; }
        .dashboard-header h5 { font-size: 16px; }
        .stat-card { background: white; border-radius: 8px; padding: 0.5rem; text-align: center; }
        .stat-number { font-size: 1.5rem; font-weight: 700; }
        .stat-card.passed .stat-number { color: #28a745; }
        .stat-card.failed .stat-number { color: #dc3545; }
        .console-output { background: #1e1e1e; color: #d4d4d4; height: 120px; overflow: auto; font-size: 9px; font-family: monospace; }
        .browser-preview { background: #000; min-height: 200px; }
        .browser-preview img { width: 100%; height: auto; }
        .browser-url { background: #333; color: #0f0; padding: 4px 8px; font-size: 9px; font-family: monospace; }
        .test-item { border-left: 3px solid #ddd; padding: 2px 6px; margin: 2px 0; cursor: pointer; font-size: 11px; }
        .test-item.passed { border-color: #28a745; background: #f0fff4; }
        .test-item.failed { border-color: #dc3545; background: #fff5f5; }
        .test-item.skipped { border-color: #ffc107; background: #fffbeb; }
        .screenshot-thumb { width: 60px; height: 35px; object-fit: cover; border-radius: 3px; cursor: pointer; border: 1px solid #ddd; }
        .screenshot-thumb:hover { border-color: #667eea; transform: scale(1.05); }
        .step-row { display: flex; align-items: center; padding: 4px; border-bottom: 1px solid #eee; }
        .error-text { color: #dc3545; font-family: monospace; font-size: 9px; white-space: pre-wrap; background: #fff5f5; padding: 4px; border-radius: 4px; max-height: 100px; overflow: auto; }
        .test-case-item { padding: 4px 8px; border-bottom: 1px solid #eee; }
        .test-case-item:hover { background: #f8f9fa; }
        .suite-badge { font-size: 10px; }
        .nav-tabs .nav-link { font-size: 11px; padding: 0.25rem 0.5rem; }
        .accordion-button { font-size: 11px; padding: 0.4rem 0.75rem; }
        .card-header { padding: 0.4rem 0.75rem; }
        .screenshots-gallery { display: flex; flex-wrap: wrap; gap: 4px; }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="container-fluid px-2">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-robot"></i> HR Robots Test Dashboard</h5>
                <div id="status-badge" class="badge bg-secondary px-2 py-1">IDLE</div>
            </div>
        </div>
    </div>
    <div class="container-fluid p-2" id="app-container"></div>
    
    <div class="modal fade" id="screenshotModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header py-1">
                    <small class="modal-title fw-bold" id="screenshotModalTitle">Screenshot</small>
                    <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-2">
                    <img id="modalScreenshot" src="" alt="Screenshot" style="max-width:100%;max-height:75vh;">
                    <p class="text-muted small mt-1 mb-0" id="modalUrl"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>
let testSuites = {};
let testScreenshots = {};
let selectedTest = null;

document.addEventListener('DOMContentLoaded', async () => {
    await loadSuites();
    renderDashboard();
    setInterval(updateStatus, 1000);
    setInterval(updateScreenshot, 500);
    setInterval(loadTestScreenshots, 2000);
});

async function loadSuites() {
    try { testSuites = await (await fetch('/api/suites')).json(); } catch (e) {}
}

async function loadTestScreenshots() {
    try { testScreenshots = await (await fetch('/api/all-test-screenshots')).json(); } catch (e) {}
}

function renderDashboard() {
    document.getElementById('app-container').innerHTML = `
        <div class="row g-2 mb-2">
            <div class="col"><div class="stat-card passed"><div class="stat-number" id="stat-passed">0</div><small>Passed</small></div></div>
            <div class="col"><div class="stat-card failed"><div class="stat-number" id="stat-failed">0</div><small>Failed</small></div></div>
            <div class="col"><div class="stat-card"><div class="stat-number text-warning" id="stat-skipped">0</div><small>Skipped</small></div></div>
            <div class="col"><div class="stat-card"><div class="stat-number text-info" id="stat-progress">0%</div><small id="stat-counts">0/0</small></div></div>
        </div>
        <div class="row g-2">
            <div class="col-lg-2">
                <div class="card mb-2">
                    <div class="card-header bg-white"><small class="fw-bold"><i class="bi bi-gear"></i> Controls</small></div>
                    <div class="card-body p-2">
                        <div class="progress mb-2" style="height:16px;"><div id="progress-bar" class="progress-bar progress-bar-striped" style="width:0%">0%</div></div>
                        <div class="btn-group btn-group-sm w-100 mb-1">
                            <button id="btn-start" class="btn btn-success" onclick="startTests()"><i class="bi bi-play-fill"></i></button>
                            <button id="btn-pause" class="btn btn-warning" onclick="pauseTests()" disabled><i class="bi bi-pause-fill"></i></button>
                            <button id="btn-resume" class="btn btn-info" onclick="resumeTests()" disabled><i class="bi bi-skip-forward-fill"></i></button>
                            <button id="btn-stop" class="btn btn-danger" onclick="stopTests()" disabled><i class="bi bi-stop-fill"></i></button>
                        </div>
                        <div class="btn-group btn-group-sm w-100">
                            <button class="btn btn-outline-secondary" onclick="resetTests()"><i class="bi bi-arrow-counterclockwise"></i></button>
                            <button class="btn btn-outline-primary" onclick="downloadReport()" id="btn-report" disabled><i class="bi bi-download"></i></button>
                        </div>
                        <div id="current-test" class="text-muted small mt-1 text-truncate"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header bg-white"><small class="fw-bold"><i class="bi bi-list-check"></i> Suites</small></div>
                    <div class="card-body p-1" id="suite-list" style="max-height:150px;overflow:auto;"></div>
                    <div class="card-footer bg-white p-1">
                        <button class="btn btn-outline-primary btn-sm" onclick="selectAll()">All</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="selectNone()">None</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-3">
                <div class="card h-100">
                    <div class="card-header bg-white d-flex justify-content-between">
                        <small class="fw-bold"><i class="bi bi-display"></i> Live Preview</small>
                        <span id="live-badge" class="badge bg-danger" style="display:none;font-size:8px;">● LIVE</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="browser-url" id="browser-url">No session</div>
                        <div class="browser-preview" id="browser-preview"><div class="text-center text-muted py-4"><i class="bi bi-display" style="font-size:1.5rem;"></i></div></div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <ul class="nav nav-tabs" role="tablist">
                    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#results-tab">Results</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#testcases-tab">Test Cases</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#console-tab">Console</a></li>
                </ul>
                <div class="tab-content border border-top-0 bg-white" style="max-height:calc(100vh - 200px);overflow:auto;">
                    <div class="tab-pane fade show active p-1" id="results-tab">
                        <div class="accordion accordion-flush" id="resultsAccordion"></div>
                    </div>
                    <div class="tab-pane fade p-1" id="testcases-tab">
                        <div id="testCasesList"></div>
                    </div>
                    <div class="tab-pane fade p-0" id="console-tab">
                        <pre id="output-console" class="m-0 p-2 console-output" style="height:300px;"></pre>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-2 mt-2">
            <div class="col-12">
                <div class="card" id="test-details-card" style="display:none;">
                    <div class="card-header bg-white d-flex justify-content-between">
                        <small class="fw-bold"><i class="bi bi-info-circle"></i> <span id="detail-test-name"></span></small>
                        <button class="btn btn-sm btn-outline-secondary py-0" onclick="closeDetails()"><i class="bi bi-x"></i></button>
                    </div>
                    <div class="card-body p-2" id="test-details-content"></div>
                </div>
            </div>
        </div>`;
    renderSuiteList();
    renderTestCases();
}

function renderSuiteList() {
    document.getElementById('suite-list').innerHTML = Object.entries(testSuites).map(([id, s]) => 
        `<div class="form-check"><input class="form-check-input suite-checkbox" type="checkbox" value="${id}" id="s-${id}" checked onchange="renderTestCases()">
        <label class="form-check-label" for="s-${id}">${s.name.replace(' Tests','')}</label></div>`).join('');
}

function renderTestCases() {
    const selectedSuites = getSelectedSuites();
    let html = '';
    let totalTests = 0;
    
    Object.entries(testSuites).forEach(([suiteId, suite]) => {
        if (!selectedSuites.includes(suiteId)) return;
        
        const testCount = suite.tests ? Object.keys(suite.tests).length : 0;
        totalTests += testCount;
        
        html += `<div class="mb-2 suite-section" data-suite="${suiteId}">
            <div class="bg-light p-1 fw-bold border-bottom d-flex justify-content-between">
                <span><i class="bi bi-folder"></i> ${suite.name}</span>
                <span class="badge bg-secondary">${testCount} tests</span>
            </div>
            <div class="small text-muted px-1">${suite.description}</div>`;
        if (suite.tests) {
            Object.entries(suite.tests).forEach(([testName, desc]) => {
                html += `<div class="test-case-item"><code class="text-primary">${testName}</code><br><span class="text-muted">${desc}</span></div>`;
            });
        }
        html += '</div>';
    });
    
    if (!html) {
        html = '<div class="text-center text-muted py-3"><i class="bi bi-info-circle"></i> Select suites to view test cases</div>';
    } else {
        html = `<div class="bg-primary text-white p-1 mb-2 rounded small"><i class="bi bi-list-check"></i> ${totalTests} test cases in ${selectedSuites.length} suite(s)</div>` + html;
    }
    
    document.getElementById('testCasesList').innerHTML = html;
}

function selectAll() { document.querySelectorAll('.suite-checkbox').forEach(cb => cb.checked = true); renderTestCases(); }
function selectNone() { document.querySelectorAll('.suite-checkbox').forEach(cb => cb.checked = false); renderTestCases(); }
function getSelectedSuites() { return Array.from(document.querySelectorAll('.suite-checkbox:checked')).map(cb => cb.value); }

async function startTests() { const s = getSelectedSuites(); if (!s.length) return alert('Select suites'); await fetch('/api/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ suites: s }) }); }
async function pauseTests() { await fetch('/api/pause', { method: 'POST' }); }
async function resumeTests() { await fetch('/api/resume', { method: 'POST' }); }
async function stopTests() { await fetch('/api/stop', { method: 'POST' }); }
async function resetTests() { await fetch('/api/reset', { method: 'POST' }); document.getElementById('resultsAccordion').innerHTML = ''; closeDetails(); testScreenshots = {}; }
function downloadReport() { window.open('/api/report/html', '_blank'); }
function closeDetails() { document.getElementById('test-details-card').style.display = 'none'; }
</script>

<script>
async function updateScreenshot() {
    try {
        const data = await (await fetch('/api/screenshot')).json();
        const preview = document.getElementById('browser-preview');
        const urlBar = document.getElementById('browser-url');
        const liveBadge = document.getElementById('live-badge');
        if (data.screenshot) {
            preview.innerHTML = `<img src="data:image/png;base64,${data.screenshot}">`;
            urlBar.textContent = data.url || 'Loading...';
            liveBadge.style.display = 'inline';
        } else { liveBadge.style.display = 'none'; }
    } catch (e) {}
}

async function updateStatus() {
    try {
        const state = await (await fetch('/api/status')).json();
        
        document.getElementById('stat-passed').textContent = state.passed;
        document.getElementById('stat-failed').textContent = state.failed;
        document.getElementById('stat-skipped').textContent = state.skipped + state.errors;
        document.getElementById('stat-progress').textContent = Math.min(state.progress, 100) + '%';
        document.getElementById('stat-counts').textContent = `${state.completed_count || 0}/${state.total_tests || 0}`;
        
        const pb = document.getElementById('progress-bar');
        pb.style.width = Math.min(state.progress, 100) + '%';
        pb.textContent = Math.min(state.progress, 100) + '%';
        pb.className = 'progress-bar progress-bar-striped' + (state.status === 'running' ? ' progress-bar-animated' : '') + (state.failed > 0 ? ' bg-danger' : ' bg-success');
        
        const colors = { idle: 'secondary', running: 'primary', paused: 'warning', completed: 'success', stopped: 'danger' };
        const badge = document.getElementById('status-badge');
        badge.className = `badge bg-${colors[state.status] || 'secondary'} px-2 py-1`;
        badge.textContent = state.status.toUpperCase();
        
        document.getElementById('current-test').innerHTML = state.current_test ? `→ ${state.current_test}` : '';
        
        const isRunning = state.status === 'running', isPaused = state.status === 'paused';
        const isIdle = ['idle', 'completed', 'stopped'].includes(state.status);
        document.getElementById('btn-start').disabled = !isIdle;
        document.getElementById('btn-pause').disabled = !isRunning;
        document.getElementById('btn-resume').disabled = !isPaused;
        document.getElementById('btn-stop').disabled = isIdle;
        document.getElementById('btn-report').disabled = state.results.length === 0;
        
        document.getElementById('output-console').textContent = (state.current_output || '').slice(-5000);
        document.getElementById('output-console').scrollTop = 99999;
        
        renderGroupedResults(state.suites_results || {});
    } catch (e) {}
}

function renderGroupedResults(suitesResults) {
    const accordion = document.getElementById('resultsAccordion');
    let html = '';
    
    Object.entries(suitesResults).forEach(([suiteName, tests], idx) => {
        const passed = tests.filter(t => t.status === 'passed').length;
        const failed = tests.filter(t => t.status === 'failed').length;
        const total = tests.length;
        const statusClass = failed > 0 ? 'danger' : (passed === total && total > 0 ? 'success' : 'secondary');
        
        html += `
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button py-1 ${idx > 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#suite-${idx}">
                    <span class="badge bg-${statusClass} me-2 suite-badge">${passed}/${total}</span>
                    ${suiteName}
                    <span class="ms-auto me-2 small"><span class="text-success">${passed}✓</span> <span class="text-danger">${failed}✗</span></span>
                </button>
            </h2>
            <div id="suite-${idx}" class="accordion-collapse collapse ${idx === 0 ? 'show' : ''}">
                <div class="accordion-body p-1">
                    ${tests.map(t => {
                        const screenshots = testScreenshots[t.name] || [];
                        return `
                        <div class="test-item ${t.status}" onclick="showTestDetails(${JSON.stringify(t).replace(/"/g, '&quot;')})">
                            <div class="d-flex align-items-center">
                                <span class="badge bg-${t.status === 'passed' ? 'success' : t.status === 'failed' ? 'danger' : 'warning'} me-1">
                                    ${t.status === 'passed' ? '✓' : t.status === 'failed' ? '✗' : '○'}
                                </span>
                                <span class="flex-grow-1 text-truncate">${t.name}</span>
                                ${t.failed_step ? '<i class="bi bi-exclamation-triangle text-danger"></i>' : ''}
                                <span class="badge bg-light text-dark ms-1">${screenshots.length} <i class="bi bi-image"></i></span>
                            </div>
                            ${screenshots.length > 0 ? `
                            <div class="screenshots-gallery mt-1">
                                ${screenshots.slice(0, 5).map(s => `<img src="data:image/png;base64,${s.screenshot}" class="screenshot-thumb" onclick="event.stopPropagation();showScreenshotModal('data:image/png;base64,${s.screenshot}','${s.url || ''}')" title="${s.action || 'Step'}">`).join('')}
                                ${screenshots.length > 5 ? `<span class="badge bg-secondary align-self-center">+${screenshots.length - 5}</span>` : ''}
                            </div>` : ''}
                        </div>`;
                    }).join('')}
                </div>
            </div>
        </div>`;
    });
    
    accordion.innerHTML = html || '<div class="text-center text-muted py-3">No results yet</div>';
}

function showTestDetails(test) {
    selectedTest = test;
    document.getElementById('test-details-card').style.display = 'block';
    document.getElementById('detail-test-name').textContent = test.name;
    
    const screenshots = testScreenshots[test.name] || [];
    
    let html = `
        <div class="row">
            <div class="col-md-4">
                <p class="mb-1"><strong>Status:</strong> <span class="badge bg-${test.status === 'passed' ? 'success' : 'danger'}">${test.status.toUpperCase()}</span></p>
                <p class="mb-1"><strong>Suite:</strong> ${test.suite || 'Unknown'}</p>
                <p class="mb-1"><strong>Time:</strong> ${new Date(test.time).toLocaleString()}</p>
                <p class="mb-1"><strong>Screenshots:</strong> ${screenshots.length}</p>
            </div>
            <div class="col-md-8">
                ${test.failed_step || test.details ? `<div class="error-text">${escapeHtml(test.failed_step || '')}\n${escapeHtml(test.details || '')}</div>` : '<span class="text-success">No errors</span>'}
            </div>
        </div>`;
    
    if (screenshots.length > 0) {
        html += `<hr class="my-2"><p class="mb-1"><strong>Step Screenshots:</strong></p>
        <div class="table-responsive" style="max-height:200px;overflow:auto;">
            <table class="table table-sm table-bordered mb-0">
                <thead class="table-light sticky-top"><tr><th>#</th><th>Action</th><th>URL</th><th>Screenshot</th></tr></thead>
                <tbody>
                    ${screenshots.map((s, i) => `
                        <tr>
                            <td>${i + 1}</td>
                            <td>${s.action || '-'}</td>
                            <td class="text-truncate" style="max-width:200px;" title="${s.url || ''}">${s.url ? s.url.split('/').pop() || '/' : '-'}</td>
                            <td><img src="data:image/png;base64,${s.screenshot}" class="screenshot-thumb" onclick="showScreenshotModal('data:image/png;base64,${s.screenshot}','${s.url || ''}')"></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>`;
    }
    
    document.getElementById('test-details-content').innerHTML = html;
    document.getElementById('test-details-card').scrollIntoView({ behavior: 'smooth' });
}

function showScreenshotModal(src, url) {
    document.getElementById('modalScreenshot').src = src;
    document.getElementById('modalUrl').textContent = url;
    document.getElementById('screenshotModalTitle').textContent = url ? url.split('/').pop() || 'Screenshot' : 'Screenshot';
    new bootstrap.Modal(document.getElementById('screenshotModal')).show();
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
